name: E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # wrangler dev reads these from .dev.vars (gitignored). In CI we generate a
      # throwaway pair; the value only has to be internally consistent so login
      # works. E2E_ADMIN_PASSWORD lets the test helpers skip parsing the file.
      - name: Write dev vars
        run: |
          {
            echo 'ADMIN_PASSWORD="ci-test-password"'
            echo 'SESSION_SECRET="ci-test-session-secret-not-used-in-prod"'
          } > .dev.vars

      - name: Apply local D1 schema
        run: npm run db:apply:local

      - name: Run E2E tests
        run: npm run e2e
        env:
          CI: "true"
          E2E_ADMIN_PASSWORD: "ci-test-password"

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
